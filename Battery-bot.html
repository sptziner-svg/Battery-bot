let timerInterval = null;
let countdownSec = 0;
let running = false;

// ─── INIT ─────────────────────────────────────────────────
function init() {
  const saved = localStorage.getItem('bcbot_config');
  if (saved) { config = JSON.parse(saved); }
  const savedTopics = localStorage.getItem('bcbot_topics');
  if (savedTopics) { topics = JSON.parse(savedTopics); }
  else {
    topics = [
      { id: uid(), name: 'Bateria AA', value: 0, unit: 'un' },
      { id: uid(), name: 'Bateria 18650', value: 0, unit: 'un' },
      { id: uid(), name: 'Pack Li-Ion', value: 0, unit: 'un' },
    ];
  }
  if (config.token) document.getElementById('botToken').value = config.token;
  if (config.chatId) document.getElementById('chatId').value = config.chatId;
  document.getElementById('interval').value = config.interval || 60;
  renderTopics();
  refreshPreview();
  log('info', 'Sistema iniciado. Configure o bot e pressione Iniciar.');
}

function uid() { return Math.random().toString(36).slice(2,9); }

// ─── CONFIG ───────────────────────────────────────────────
function saveConfig() {
  config.token = document.getElementById('botToken').value.trim();
  config.chatId = document.getElementById('chatId').value.trim();
  config.interval = parseInt(document.getElementById('interval').value) || 60;
  localStorage.setItem('bcbot_config', JSON.stringify(config));
  log('ok', `Configuração salva. Intervalo: ${config.interval} min.`);
}

function saveTopics() {
  localStorage.setItem('bcbot_topics', JSON.stringify(topics));
}

// ─── TOPICS ───────────────────────────────────────────────
function renderTopics() {
  const grid = document.getElementById('topicsGrid');
  grid.innerHTML = '';
  topics.forEach(t => {
    const card = document.createElement('div');
    card.className = 'topic-card';
    card.innerHTML = `
      <div class="topic-header">
        <input class="topic-name-input" value="${esc(t.name)}" onchange="updateTopic('${t.id}','name',this.value)" placeholder="Nome...">
        <button class="del-btn" onclick="deleteTopic('${t.id}')" title="Remover">✕</button>
      </div>
      <div class="count-row">
        <button class="count-btn danger" onclick="changeCount('${t.id}',-1)">−</button>
        <input class="count-input" type="number" value="${t.value}" min="0"
          onchange="updateTopic('${t.id}','value',+this.value)"
          oninput="updateTopic('${t.id}','value',+this.value)">
        <button class="count-btn success" onclick="changeCount('${t.id}',1)">+</button>
        <input class="unit-input" value="${esc(t.unit)}" onchange="updateTopic('${t.id}','unit',this.value)" placeholder="unit">
      </div>
    `;
    grid.appendChild(card);
  });
  document.getElementById('topicCount').textContent = `${topics.length} tópico${topics.length!==1?'s':''}`;
  refreshPreview();
}

function esc(s) { return String(s).replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function updateTopic(id, field, val) {
  const t = topics.find(x=>x.id===id);
  if (!t) return;
  if (field==='value') val = Math.max(0, isNaN(val)?0:val);
  t[field] = val;
  saveTopics();
  refreshPreview();
}

function changeCount(id, delta) {
  const t = topics.find(x=>x.id===id);
  if (!t) return;
  t.value = Math.max(0, (t.value||0) + delta);
  saveTopics();
  renderTopics();
}

function deleteTopic(id) {
  topics = topics.filter(x=>x.id!==id);
  saveTopics();
  renderTopics();
  log('warn', 'Tópico removido.');
}

function addTopic() {
  const name = document.getElementById('newTopicName').value.trim();
  if (!name) { log('err','Digite um nome para o tópico.'); return; }
  const val = parseInt(document.getElementById('newTopicVal').value)||0;
  const unit = document.getElementById('newTopicUnit').value.trim()||'un';
  topics.push({ id: uid(), name, value: val, unit });
  document.getElementById('newTopicName').value='';
  document.getElementById('newTopicVal').value='0';
  document.getElementById('newTopicUnit').value='';
  saveTopics();
  renderTopics();
  log('ok', `Tópico "${name}" adicionado.`);
}

// ─── MESSAGE ──────────────────────────────────────────────
function buildMessage(isReminder=false) {
  const now = new Date();
  const ts = now.toLocaleString('pt-BR', { dateStyle:'short', timeStyle:'short' });
  let msg = `⚡ *CONTAGEM DE BATERIAS*\n`;
  msg += `🕒 ${ts}\n`;
  if (isReminder) msg += `🔔 _Lembrete automático de atualização_\n`;
  msg += `${'─'.repeat(28)}\n\n`;
  topics.forEach(t => {
    const bar = buildBar(t.value);
    msg += `📦 *${t.name}*\n`;
    msg += `   ${bar}  \`${t.value} ${t.unit}\`\n\n`;
  });
  msg += `${'─'.repeat(28)}\n`;
  msg += `📊 Total de tópicos: ${topics.length}`;
  return msg;
}

function buildBar(val) {
  const max = 20;
  const filled = Math.min(max, val);
  const blocks = Math.round((filled/max)*8);
  return '█'.repeat(blocks) + '░'.repeat(8-blocks);
}

function refreshPreview() {
  document.getElementById('previewBody').textContent = buildMessage(false);
}

// ─── TELEGRAM ─────────────────────────────────────────────
async function sendTelegram(text) {
  if (!config.token || !config.chatId) throw new Error('Token ou Chat ID não configurados.');
  const url = `https://api.telegram.org/bot${config.token}/sendMessage`;

  // IDs negativos longos (supergrupos/canais) devem ser número, não string
  const rawId = config.chatId.trim();
  const chatId = /^-?\d+$/.test(rawId) ? Number(rawId) : rawId;

  // Tenta com Markdown; se falhar, reenvia como texto simples
  let res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ chat_id: chatId, text, parse_mode: 'Markdown' })
  });
  let data = await res.json();

  if (!data.ok && data.description && data.description.includes("parse")) {
    log('warn', '⚠️ Markdown rejeitado, reenviando como texto simples...');
    const plain = text.replace(/[*_`]/g, '');
    res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: chatId, text: plain })
    });
    data = await res.json();
  }

  if (!data.ok) {
    // Log detalhado para facilitar diagnóstico
    log('err', `❌ API Telegram: "${data.description}" (código ${data.error_code})`);
    if (data.error_code === 400) log('warn', '👉 Verifique se o Chat ID está correto.');
    if (data.error_code === 401) log('warn', '👉 Token inválido. Gere um novo no @BotFather.');
    if (data.error_code === 403) log('warn', '👉 Bot não tem acesso. Adicione-o ao grupo como admin.');
    throw new Error(data.description || 'Erro desconhecido');
  }
  return data;
}

async function sendNow() {
  saveConfig();
  log('info', 'Enviando mensagem...');
  try {
    await sendTelegram(buildMessage(false));
    log('ok', '✅ Mensagem enviada com sucesso!');
    if (running) resetTimer();
  } catch(e) {
    log('err', '❌ Erro ao enviar: ' + e.message);
  }
}

async function testMessage() {
  saveConfig();
  log('info', '🧪 Enviando mensagem de teste...');
  try {
    await sendTelegram('🧪 *Teste do Battery Count Bot*\n\nConexão funcionando! ✅\n\nToken e Chat ID validados.');
    log('ok', '✅ Teste bem-sucedido! Bot conectado.');
  } catch(e) {
    log('err', '❌ Falha no teste: ' + e.message);
  }
}

// ─── TIMER ────────────────────────────────────────────────
function startBot() {
  saveConfig();
  if (!config.token || !config.chatId) {
    log('err', 'Configure Token e Chat ID antes de iniciar.');
    return;
  }
  running = true;
  resetTimer();
  document.getElementById('startBtn').disabled = true;
  document.getElementById('stopBtn').disabled = false;
  const dot = document.getElementById('statusDot');
  dot.className = 'dot active';
  document.getElementById('statusText').innerHTML = `Bot <strong>ativo</strong> — enviando a cada ${config.interval} min`;
  log('ok', `▶ Bot iniciado. Intervalo: ${config.interval} min.`);
  sendNow();
}

function stopBot() {
  running = false;
  clearInterval(timerInterval);
  timerInterval = null;
  document.getElementById('startBtn').disabled = false;
  document.getElementById('stopBtn').disabled = true;
  document.getElementById('statusDot').className = 'dot paused';
  document.getElementById('statusText').innerHTML = `Bot <strong>parado</strong>`;
  document.getElementById('timerDisplay').textContent = '--:--';
  log('warn', '⏹ Bot parado.');
}

function resetTimer() {
  clearInterval(timerInterval);
  countdownSec = (config.interval || 60) * 60;
  updateTimerDisplay();
  timerInterval = setInterval(async () => {
    countdownSec--;
    if (countdownSec <= 0) {
      log('info', '🔔 Lembrete automático — enviando...');
      try {
        await sendTelegram(buildMessage(true));
        log('ok', '✅ Lembrete enviado!');
      } catch(e) {
        log('err', '❌ Erro no lembrete: ' + e.message);
      }
      countdownSec = (config.interval || 60) * 60;
    }
    updateTimerDisplay();
  }, 1000);
}

function updateTimerDisplay() {
  const m = String(Math.floor(countdownSec/60)).padStart(2,'0');
  const s = String(countdownSec%60).padStart(2,'0');
  document.getElementById('timerDisplay').textContent = `${m}:${s}`;
}

// ─── LOG ──────────────────────────────────────────────────
function log(type, msg) {
  const box = document.getElementById('logBox');
  const now = new Date().toLocaleTimeString('pt-BR');
  const line = document.createElement('div');
  line.className = `log-${type}`;
  line.textContent = `[${now}] ${msg}`;
  if (box.textContent === '[ aguardando... ]') box.innerHTML = '';
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

init();
</script>
